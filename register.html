<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Registration | CuePointe Action Pool</title>
    <style>
        :root {
            --brand-gold: #D4AF37;
            --brand-black: #0a0a0a;
            --neon-green: #39FF14;
            --stadium-gray: #1a1a1a;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--brand-black);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        .form-container {
            background: var(--stadium-gray);
            padding: 40px;
            border-radius: 10px;
            border: 2px solid var(--brand-gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            width: 100%;
            max-width: 500px;
            margin: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--brand-gold);
            letter-spacing: 2px;
        }

        .header p {
            color: var(--neon-green);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #ccc;
        }

        input, select {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--neon-green);
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--brand-gold);
            color: black;
            border: none;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--neon-green);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(57, 255, 20, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-link:hover { color: var(--brand-gold); }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header">
            <h1>JOIN THE ACTION</h1>
            <p>Official Player Entry Form</p>
        </div>

        <form action="#" method="POST">
            <div class="form-group">
                <label for="name">Full Player Name</label>
                <input type="text" id="name" name="name" placeholder="E.G. THOMAS OTIENO" required>
            </div>

            <div class="form-group">
                <label for="phone">WhatsApp Number (For Tournament Alerts)</label>
                <input type="tel" id="phone" name="phone" placeholder="+256..." required>
            </div>

            <div class="form-group">
                <label for="venue">Preferred Home Venue</label>
                <select id="venue" name="venue">
                    <option value="kabalagala">Kabalagala Hub</option>
                    <option value="kansanga">Kansanga Hub</option>
                    <option value="other">Other (Kampala)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="rank">Current Player Level</label>
                <select id="rank" name="rank">
                    <option value="amateur">Amateur / Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="pro">Semi-Pro / Pro</option>
                </select>
            </div>

            <button type="submit" class="btn-submit">CONFIRM REGISTRATION</button>
        </form>

        <a href="index.html" class="back-link">← RETURN TO HOME</a>
    </div>

</body>
</html>
