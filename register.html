<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register to Play | CuePointe</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #D4AF37;
            --brand-black: #0a0a0a;
            --stadium-gray: #1a1a1a;
        }

        body {
            font-family: 'Oswald', sans-serif;
            background-color: var(--brand-black);
            color: white;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .form-container {
            background: var(--stadium-gray);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid var(--brand-gold);
            width: 100%;
            max-width: 600px;
        }

        .logo-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-header img {
            max-width: 150px;
            border-radius: 8px;
        }

        h1 {
            color: var(--brand-gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: var(--brand-gold);
            text-transform: uppercase;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            font-family: 'Oswald', sans-serif;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--brand-gold);
            color: black;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: #fff;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="logo-header">
        <img src="CuePointe_Logo.jpg" alt="CuePointe Logo">
    </div>
    
    <h1>REGISTER TO PLAY</h1>

    <form action="https://formspree.io/f/xvzvedly" method="POST">
        
        <div class="form-group">
            <label>First Name *</label>
            <input type="text" name="first_name" required>
        </div>

        <div class="form-group">
            <label>Last Name *</label>
            <input type="text" name="last_name" required>
        </div>

        <div class="form-group">
            <label>Phone / WhatsApp *</label>
            <input type="tel" name="phone" placeholder="+256..." required>
        </div>

        <div class="form-group">
            <label>Skill Level *</label>
            <select name="skill_level" required>
                <option value="">Select your level</option>
                <option value="Beginner">Beginner – I play casually</option>
                <option value="Intermediate">Intermediate – I play regularly</option>
                <option value="Advanced">Advanced – I compete seriously</option>
                <option value="Professional">Professional – I play at top level</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tournament / Event *</label>
            <select name="event" required>
                <option value="">Select an event</option>
                <option value="Weekly #18">Weekly Knockout #18 – April 5, 2026</option>
                <option value="Weekly #19">Weekly Knockout #19 – April 12, 2026</option>
                <option value="City League">Kampala City League</option>
            </select>
        </div>

        <div class="form-group">
            <label>Area / Neighborhood *</label>
            <input type="text" name="area" required>
        </div>

        <div class="form-group">
            <label>How did you hear about us?</label>
            <select name="source">
                <option value="Friend">Friend / Word of mouth</option>
                <option value="Social Media">Social Media</option>
                <option value="TikTok">TikTok</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Submit Registration</button>
    </form>
</div>

</body>
</html>
