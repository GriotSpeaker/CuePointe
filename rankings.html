<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-221BNVJR22"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-221BNVJR22');
  </script>
  
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Rankings | CuePointe Action Pool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root{--gold:#F5A800;--gold-dark:#D68A00;--green:#2C5F2E;--green-dark:#1a3a1b;--black:#0D0D0D;--white:#ffffff;--orange:#E8681A;--gray:#141414}
    *{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
    body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden}

    /* NAV */
    nav{position:fixed;top:0;width:100%;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:10px 5vw;background:rgba(13,13,13,0.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(245,168,0,0.15)}
    .nav-logo img{height:48px;width:auto;filter:drop-shadow(0 2px 8px rgba(245,168,0,0.3))}
    .nav-links{display:flex;gap:22px;list-style:none}
    .nav-links a{color:rgba(255,255,255,0.65);text-decoration:none;font-family:'Barlow Condensed';font-weight:600;font-size:12px;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s}
    .nav-links a:hover,.nav-links a.active{color:var(--gold)}
    .nav-cta{background:var(--gold);color:var(--black);padding:9px 20px;border:none;cursor:pointer;font-family:'Barlow Condensed';font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:background 0.2s;text-decoration:none;display:inline-block}
    .nav-cta:hover{background:var(--orange)}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer}
    .hamburger span{width:24px;height:2px;background:var(--gold)}

    /* HERO */
    .page-hero{padding:120px 6vw 60px;background:var(--black);position:relative;border-bottom:1px solid rgba(245,168,0,0.15)}
    .page-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(245,168,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(245,168,0,0.03) 1px,transparent 1px);background-size:50px 50px}
    .page-hero-inner{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px}
    .page-hero h1{font-family:'Bebas Neue';font-size:clamp(52px,8vw,100px);line-height:0.9;color:var(--white)}
    .page-hero h1 span{color:var(--gold)}
    .meta-pill{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:8px 16px;font-family:'Barlow Condensed';font-size:12px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5)}

    /* TABLE STYLES */
    .dash-wrap{padding:50px 6vw 80px;max-width:1400px;margin:0 auto}
    .rankings-table-wrap{overflow-x:auto}
    .rankings-table{width:100%;border-collapse:collapse;min-width:700px}
    .rankings-table thead tr{border-bottom:2px solid var(--gold)}
    .rankings-table th{font-family:'Barlow Condensed';font-weight:700;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:12px 14px;text-align:left}
    .rankings-table td{padding:14px 14px;vertical-align:middle;border-bottom:1px solid rgba(255,255,255,0.05)}
    .rank-cell{font-family:'Bebas Neue';font-size:24px;width:50px}
    .rank-cell.gold{color:var(--gold)}.rank-cell.silver{color:#C0C0C0}.rank-cell.bronze{color:#CD7F32}
    .player-name{font-family:'Barlow Condensed';font-weight:700;font-size:16px;color:var(--white)}
    .wbar-wrap{width:90px;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;display:inline-block}
    .wbar{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--gold))}
    .pts-cell{font-family:'Bebas Neue';font-size:22px;color:var(--gold)}
    .tier-badge{display:inline-block;padding:2px 8px;font-family:'Barlow Condensed';font-weight:700;font-size:10px;letter-spacing:2px;text-transform:uppercase}
    .tier-elite{background:rgba(245,168,0,0.15);color:var(--gold);border:1px solid rgba(245,168,0,0.3)}

    /* REVEAL ANIMATION */
    .reveal{opacity:0;transform:translateY(22px);transition:opacity 0.5s,transform 0.5s}
    .reveal.visible{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>

<nav>
  <div class="nav-logo"><a href="index.html"><img src="CuePointe_Logo.jpg" alt="CuePointe"></a></div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="rankings.html" class="active">Rankings</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="register.html" class="nav-cta">Register Now</a>
</nav>

<div class="page-hero">
  <div class="page-hero-grid"></div>
  <div class="page-hero-inner">
    <div>
      <div style="font-family:'Barlow Condensed';font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-bottom:10px">Home / Rankings</div>
      <h1>PLAYER<br><span>RANKINGS</span></h1>
    </div>
    <div style="display:flex;gap:24px;flex-wrap:wrap">
      <div class="meta-pill">Season <strong>2026</strong></div>
      <div class="meta-pill">Updated <strong>Live</strong></div>
    </div>
  </div>
</div>

<div class="dash-wrap">
  <div class="rankings-table-wrap reveal">
    <table class="rankings-table" id="rankTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Division</th>
          <th>Played</th>
          <th>W</th>
          <th>L</th>
          <th>Win Rate</th>
          <th>Badges</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody id="rankBody">
        </tbody>
    </table>
  </div>
</div>

<script>
  // Animation Observer
  const obs = new IntersectionObserver((e) => {
    e.forEach((en, i) => { if (en.isIntersecting) setTimeout(() => en.target.classList.add('visible'), i * 60) });
  }, { threshold: 0.08 });
  document.querySelectorAll('.reveal').forEach(r => obs.observe(r));

  // Live Data Loader
  async function loadRankings() {
    try {
      const response = await fetch('players.json');
      const data = await response.json();
      const tableBody = document.getElementById('rankBody');
      tableBody.innerHTML = '';

      // Sorting players by points
      data.players.sort((a, b) => b.ranking_points - a.ranking_points);

      data.players.forEach((player, index) => {
        const rank = index + 1;
        let rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'other';

        tableBody.innerHTML += `
          <tr>
            <td class="rank-cell ${rankClass}">${rank}</td>
            <td>
              <div style="display:flex;align-items:center;gap:12px">
                <div style="width:36px;height:36px;border-radius:50%;background:rgba(245,168,0,0.1);display:flex;align-items:center;justify-content:center">🎱</div>
                <div>
                  <div class="player-name">${player.name}</div>
                  <div style="font-size:11px;color:rgba(255,255,255,0.35)">${player.area}</div>
                </div>
              </div>
            </td>
            <td><span class="tier-badge tier-elite">${player.division}</span></td>
            <td style="font-family:'Barlow Condensed';font-weight:600">${player.played}</td>
            <td style="font-family:'Barlow Condensed';font-weight:600">${player.wins}</td>
            <td style="font-family:'Barlow Condensed';font-weight:600">${player.losses}</td>
            <td>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="wbar-wrap"><div class="wbar" style="width:${player.win_rate}%"></div></div>
                <span style="color:var(--gold);font-weight:600">${player.win_rate}%</span>
              </div>
            </td>
            <td style="font-size:16px">${player.badges}</td>
            <td class="pts-cell">${player.ranking_points.toLocaleString()}</td>
          </tr>
        `;
      });
    } catch (err) { console.error("Data load failed", err); }
  }
  window.onload = loadRankings;
</script>
</body>
</html>
